services:
  - type: web
    name: ai-tender-agent
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: SCAN_INTERVAL_MINUTES
        value: "30"
      - key: SCAN_ON_STARTUP
        value: "true"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "25"
      - key: SCAN_TIMEOUT_SECONDS
        value: "240"
      - key: STUCK_SCAN_MINUTES
        value: "10"
