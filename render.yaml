services:
  - type: web
    name: ai-tender-agent
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main_v2:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: SCAN_INTERVAL_MINUTES
        value: "30"
      - key: SCAN_ON_STARTUP
        value: "true"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "30"
      - key: SCAN_TIMEOUT_SECONDS
        value: "300"
      - key: DETAIL_CONCURRENCY
        value: "6"
      - key: DETAIL_RETRIES
        value: "3"
      - key: UZEX_API_BASE
        value: "https://apietender.uzex.uz"
      - key: UZEX_TYPE_ID
        value: "1"
      - key: UZEX_SYSTEM_ID
        value: "0"
